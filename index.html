<!DOCTYPE html>
<html>
<head>
  <title>🤟 SignAI</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
    }

    .hidden {
      display: none;
    }

    input, select, button {
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #ff7a18;
      color: white;
    }

    #avatar {
      width: 120px;
      border-radius: 50%;
      transition: 0.3s;
    }

    .talking {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h1>🤟 SignAI</h1>
<p>Smart Voice → Text → Sign Translation</p>

<!-- LOGIN -->
<div id="loginPage">
  <input type="text" id="name" placeholder="Enter Name"><br>
  <input type="number" id="age" placeholder="Enter Age"><br>
  <input type="text" id="study" placeholder="Enter Study"><br>
  <button onclick="startApp()">🚀 Start</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

  <h2 id="welcomeText"></h2>

  <!-- INPUT -->
  <input type="text" id="textInput" placeholder="Enter text">

  <!-- MIC -->
  <button onclick="startListening()">🎤 Speak</button>

  <br>

  <!-- OUTPUT -->
  <p><b>English:</b> <span id="originalText"></span></p>
  <p><b>Translated:</b> <span id="translatedText"></span></p>

  <!-- AVATAR -->
  <br>
  <div id="avatarContainer" style="width:200px; height:200px; margin:auto;"></div>
  <!-- SIGN -->
  <br><br>
  <img id="signImage" width="200">

  <br><br>

  <!-- LANGUAGE -->
  <select id="languageSelect">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="te">Telugu</option>
    <option value="ta">Tamil</option>
    <option value="kn">Kannada</option>
  </select>

  <br><br>

  <!-- BUTTONS -->
  <button onclick="speakText()">🔊 Translate</button>
  <button onclick="clearText()">🧹 Clear</button>
  <button onclick="toggleDarkMode()">🌙 Dark</button>
  <button onclick="logout()">🚪 Logout</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>

</body>
</html>
