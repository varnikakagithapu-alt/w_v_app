<!DOCTYPE html>
<html>
<head>
  <title>Inclusive Communication App</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container fade-in slide-up">

  <!-- TITLE -->
  <h1 class="title">🤟 SignAI</h1>
  <p class="tagline">Smart Voice → Text → Sign Translation</p>

  <!-- LOGIN PAGE -->
  <div id="loginPage">
    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="number" id="age" placeholder="Enter Age"><br>
    <input type="text" id="study" placeholder="Enter Study"><br>
    <button onclick="startApp()">🚀 Start</button>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden">

    <h2 id="welcomeText"></h2>

    <h1 id="mainTitle">🧠 Smart Sign Language Translator</h1>
    <p id="tagline">Bridging communication through voice, text, and sign 🤝</p>

    <!-- INPUT -->
    <input type="text" id="textInput" placeholder="Enter text">

    <!-- OUTPUT -->
    <div id="outputBox">
      <p><b>English:</b> <span id="originalText"></span></p>
      <p><b>Translated:</b> <span id="translatedText"></span></p>
    </div>

    <!-- SIGN LANGUAGE -->
    <div id="signOutput">
      <h3>🤟 Sign Language Output</h3>
      <img id="signImage" width="220">
    </div>

    <!-- AVATAR -->
    <div id="avatarBox">
      <img id="avatar" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
    </div>

    <!-- LANGUAGE SELECT -->
    <select id="languageSelect">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="te">Telugu</option>
      <option value="kn">Kannada</option>
      <option value="ta">Tamil</option>
    </select>

    <br><br>

    <!-- BUTTONS -->
    <button onclick="speakText()">🔊 Translate & Speak</button>
    <button onclick="clearText()">🧹 Clear</button>
    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <button onclick="logout()">🚪 Logout</button>

  </div>

</div>

<!-- SCRIPT (VERY IMPORTANT: keep at bottom) -->
<script src="script.js"></script>

</body>
</html>
