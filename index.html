<!DOCTYPE html>
<html>
<head>
  <title>🤟 SignAI</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Three.js r128 (same version as your threejs-start project) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
    }

    .hidden {
      display: none;
    }

    input, select, button {
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #ff7a18;
      color: white;
    }

    /* OLD static avatar image — now hidden */
    #avatarImg {
      width: 120px;
      border-radius: 50%;
      transition: 0.3s;
    }

    .talking {
      transform: scale(1.1);
    }

    /* NEW 3D avatar container */
    #avatar-container {
      width: 320px;
      height: 400px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      background: #1a1a2e;
      position: relative;
    }

    #avatar-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Status label shown below 3D avatar */
    #avatarStatus {
      font-size: 13px;
      margin-top: 6px;
      opacity: 0.8;
      min-height: 20px;
    }
  </style>
</head>

<body>

<h1>🤟 SignAI</h1>
<p>Smart Voice → Text → Sign Translation</p>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <input type="text" id="name" placeholder="Enter Name"><br>
  <input type="number" id="age" placeholder="Enter Age"><br>
  <input type="text" id="study" placeholder="Enter Study"><br>
  <button onclick="startApp()">🚀 Start</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

  <h2 id="welcomeText"></h2>

  <!-- TEXT INPUT -->
  <input type="text" id="textInput" placeholder="Enter text">

  <!-- MIC BUTTON -->
  <button onclick="startListening()">🎤 Speak</button>

  <br>

  <!-- TRANSLATION OUTPUT -->
  <p><b>English:</b> <span id="originalText"></span></p>
  <p><b>Translated:</b> <span id="translatedText"></span></p>

  <!-- 3D AVATAR (replaces the old static PNG) -->
  <div id="avatar-container">
    <!-- Three.js canvas is injected here by script.js -->
  </div>
  <div id="avatarStatus">Loading 3D avatar...</div>

  <br>

  <!-- LANGUAGE SELECT -->
  <select id="languageSelect">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="te">Telugu</option>
    <option value="ta">Tamil</option>
    <option value="kn">Kannada</option>
  </select>

  <br><br>

  <!-- ACTION BUTTONS -->
  <button onclick="speakText()">🔊 Translate</button>
  <button onclick="clearText()">🧹 Clear</button>
  <button onclick="toggleDarkMode()">🌙 Dark</button>
  <button onclick="logout()">🚪 Logout</button>

</div>

<script src="script.js"></script>

</body>
</html>
