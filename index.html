<!DOCTYPE html>
<html>
<head>
  <title>Inclusive Communication App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌍 Inclusive Communication App</h1>

<!-- LOGIN -->
<div id="loginPage">
  <input type="text" id="name" placeholder="Enter Name"><br>
  <input type="number" id="age" placeholder="Enter Age"><br>
  <input type="text" id="study" placeholder="Enter Study"><br>
  <button onclick="startApp()">Start</button>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

  <h2 id="welcomeText"></h2>

  <input type="text" id="textInput" placeholder="Enter text">

  <div id="outputBox">
    <p><b>English:</b> <span id="originalText"></span></p>
    <p><b>Translated:</b> <span id="translatedText"></span></p>
  </div>

  <!-- SIGN LANGUAGE -->
  <div id="signOutput">
    <h3>Sign Language</h3>
    <img id="signImage" width="200">
  </div>

  <select id="languageSelect">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="te">Telugu</option>
    <option value="kn">Kannada</option>
    <option value="ta">Tamil</option>
  </select>

  <br><br>

  <button onclick="speakText()">🔊 Speak</button>
  <button onclick="clearText()">🧹 Clear</button>
  <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
  <button onclick="logout()">🚪 Logout</button>

</div>

<script src="script.js"></script>

</body>
</html>
