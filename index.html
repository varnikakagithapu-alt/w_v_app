<!DOCTYPE html>
<html>
<head>
  <title>SignAI</title>

  <link rel="stylesheet" href="style.css">
  <script src="js/script.js"></script>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<h1 class="title">🤟 SignAI</h1>
<p class="tagline">Smart Voice → Text → Sign Translation</p>

<!-- LOGIN -->
<div id="loginPage" class="card">
  <input type="text" id="name" placeholder="Enter Name"><br>
  <input type="number" id="age" placeholder="Enter Age"><br>
  <input type="text" id="study" placeholder="Enter Study"><br>
  <button onclick="startApp()">🚀 Start</button>
</div>

<!-- MAIN -->
<div id="mainApp" class="hidden">

  <h2 id="welcomeText"></h2>

  <input type="text" id="textInput" placeholder="Enter text">

  <!-- MIC BUTTON -->
  <button onclick="startListening()">🎤 Speak</button>

  <div id="outputBox">
    <p><b>English:</b> <span id="originalText"></span></p>
    <p><b>Translated:</b> <span id="translatedText"></span></p>
  </div>

  <!-- AVATAR -->
  <div id="avatarBox">
    <img id="avatar" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  </div>

  <!-- SIGN -->
  <div id="signOutput">
    <h3>🤟 Sign Language</h3>
    <img id="signImage" width="220">
  </div>

  <select id="languageSelect">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="te">Telugu</option>
    <option value="kn">Kannada</option>
    <option value="ta">Tamil</option>
  </select>

  <br><br>

  <button onclick="speakText()">🔊 Translate</button>
  <button onclick="clearText()">🧹 Clear</button>
  <button onclick="toggleDarkMode()">🌙 Dark</button>
  <button onclick="logout()">🚪 Logout</button>

</div>

<script src="script.js"></script>

</body>
</html>
